  <body>
    <!--  -->
    <!-- ASIDE DO CARRINHO - SIDEBAR -->
<aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-sidebar__overlay" id="cartOverlay"></div>
    <div class="cart-sidebar__container">
        <div class="cart-sidebar__header">
            <h2 class="cart-sidebar__title">
                <span class="material-symbols-outlined">shopping_cart</span>
                Meu Carrinho
            </h2>
            <button class="cart-sidebar__close" id="closeCartBtn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <div class="cart-sidebar__content" id="carrinho">
    <!-- Item de exemplo do carrinho -->
    <!-- aqui vai ter as parada -->
    
    </div>
        
        <div class="cart-sidebar__footer">
            <div class="cart-sidebar__subtotal">
                <span>Subtotal</span>
                <span id="cartSubtotal">R$ 0,00</span>
            </div>
            <div class="cart-sidebar__total">
                <span>Total</span>
                <span id="cartTotal">R$ 0,00</span>
            </div>
            <button class="cart-sidebar__checkout" id="checkoutBtn">
                Finalizar Pedido
            </button>
        </div>
    </div>
</aside>

<!-- Botão flutuante do carrinho (para abrir o aside) -->
<button class="cart-floating-btn" id="openCartBtn">
    <span class="material-symbols-outlined">shopping_cart</span>
    <span class="cart-floating-btn__badge" id="cartBadge">0</span>
</button>
  <!-- Header e Navbar: Jolia-->

        <!--  -->

          <ul class="header__menu">
            <li class="header__item">
              <a href="#" class="header__link">Home</a>
            </li>
            <li class="header__item">
              <a href="#menu" class="header__link">Cardápio</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Sobre</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Contato</a>
            </li>
          </ul>
        </nav>

        <div class="header__social">
          <a href="#" class="header__icon"
            ><span class="material-symbols-outlined">thumb_up</span></a
          >
          <a href="#" class="header__icon"
            ><span class="material-symbols-outlined">photo_camera</span></a
          >

        <button class="header__toggle">
          <span class="material-symbols-outlined">menu</span>

<!-- Meio -->

    Aq é onde vai todo o conteúdo do site

<!-- Rodapé -->

      <p class="footer__text">
        DevBurger © 2025. Todos os direitos reservados.
      </p>
    </footer>
  </body>
  <script>
    // Controle de visibilidade do aside (carrinho)
document.addEventListener('DOMContentLoaded', function() {
    // Elementos do DOM
    const cartSidebar = document.getElementById('cartSidebar');
    const openCartBtn = document.getElementById('openCartBtn');
    const closeCartBtn = document.getElementById('closeCartBtn');
    const cartOverlay = document.getElementById('cartOverlay');

    // Verifica se todos os elementos existem antes de prosseguir
    if (!cartSidebar || !openCartBtn || !closeCartBtn || !cartOverlay) {
        console.warn('Elementos do carrinho não encontrados no DOM');
        return;
    }

    // Função para abrir o aside
    function openCart() {
        cartSidebar.classList.add('cart-sidebar--open');
        document.body.style.overflow = 'hidden'; // Impede rolagem da página
    }

    // Função para fechar o aside
    function closeCart() {
        cartSidebar.classList.remove('cart-sidebar--open');
        document.body.style.overflow = ''; // Restaura rolagem
    }

    // Eventos
    openCartBtn.addEventListener('click', openCart);
    closeCartBtn.addEventListener('click', closeCart);
    cartOverlay.addEventListener('click', closeCart);

    // Fechar ao pressionar a tecla ESC
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && cartSidebar.classList.contains('cart-sidebar--open')) {
            closeCart();
        }
    });
});
  </script>
</html>
